name: Frodos Franks CI

on:
  push:
    paths:
      - "apps/remote-one/**"
      - "apps/deployment/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/remote-one.yml"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    services:
      azurite:
        image: mcr.microsoft.com/azure-storage/azurite:3.35.0
        ports:
          - 10000:10000
        options: >-
          --health-cmd "nc -z 127.0.0.1 10000"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm publish:frodos-franks
        env:
          BUILD_SHA: ${{ github.sha }}
          BUILD_BRANCH: ${{ github.ref_name }}
          AZURE_STORAGE_CONNECTION_STRING: UseDevelopmentStorage=true

